name: Update arXiv feed

on:
  # 02:05 UTC = 11:05 JST. GitHub ActionsのscheduleはUTCです。
  schedule:
    - cron: '5 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Prevent accidental overlapping runs when the button is clicked repeatedly.
concurrency:
  group: arxiv-feed-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch arXiv papers
        env:
          # Optional. You can replace this with your contact address, but do not put API keys here.
          ARXIV_CONTACT: personal-use
        run: python scripts/fetch_arxiv.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/papers.json public/feed_status.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update arXiv feed"
            git push
          fi
